name: Build release APKs

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "UPLOAD_KEYSTORE_BASE64 secret is required for signed releases."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          cat > keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Build release APKs
        run: chmod +x gradlew && ./gradlew :mobile:assembleRelease :wear:assembleRelease --no-daemon

      - name: Prepare APKs
        run: |
          cp mobile/build/outputs/apk/release/mobile-release.apk sharemything-mobile-release.apk
          cp wear/build/outputs/apk/release/wear-release.apk sharemything-wear-release.apk

      - name: Verify upload key signature
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          EXPECTED="ff05c11d4feeb2a7529f48481d41d16c2571ebdc1798f3dbbd9bf8e43c1f86c7"
          for apk in sharemything-mobile-release.apk sharemything-wear-release.apk; do
            actual=$("$APKSIGNER" verify --print-certs "$apk" 2>&1 | grep -m1 "SHA-256 digest:" | sed 's/.*SHA-256 digest: //' | tr -d ':' | tr '[:upper:]' '[:lower:]')
            if [ "$actual" != "$EXPECTED" ]; then
              echo "Wrong signing key for $apk: $actual (expected $EXPECTED)"
              exit 1
            fi
            echo "$apk signed with upload key"
          done

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sharemything-mobile-release.apk
            sharemything-wear-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: share-my-thing-release
          path: |
            sharemything-mobile-release.apk
            sharemything-wear-release.apk
